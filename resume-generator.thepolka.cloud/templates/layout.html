<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Polkadot Cloud</title>
    
    <style>
        /* RESET & BODY SETUP */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #fcf8f2;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* Base page split layout wrapper */
        .app-container {
            display: flex;
            flex-direction: row;
            min-height: 100vh;
        }

        /* Sidebar navigation takes up a fixed width */
        .sidebar {
            width: 280px;
            background-color: #fcf8f2;
            border-right: 2px solid #1a1a1a; /* The sharp divider line from machine view */
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .logo img {
            max-width: 100%;
            height: auto;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 16px;
            font-weight: 500;
            padding: 6px 0;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Container that holds both the core app contents and the footer banner */
        .main-hero-content {
            flex: 1;
            background-color: #fcf8f2;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* The wrapper holding the actual injected content application blocks */
        .content {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers your index.html resume content perfectly */
        }

        /* PERMANENT FOOTER */
        .bottom-banner {
            padding: 2rem;
            border-top: 1px solid rgba(0,0,0,.1);
            background: #f7f6f2;
            color: #666;
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }

        .bottom-banner .legal {
            margin-top: 8px;
            font-size: 11px;
            color: #999;
        }

        /* Mobile specific view overrides matching your mobile appearance layout */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid #1a1a1a;
                background-color: #e6dcff; /* Light purple header background from mobile appearance.png */
                padding: 1.5rem;
            }

            .nav-links {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 12px;
            }
        }
    </style>
    
    <!-- Main site stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>

<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <img src="/static/images/polkadot-cloud-logo.png" alt="The Polkadot Cloud Logo">  </div>

            <nav class="nav-links">
                <a href="https://thepolka.cloud#welcome">Home</a>
                <a href="https://resume-generator.thepolka.cloud#resume">Résumé Generator</a>
                <a href="https://twitter-classic.thepolka.cloud#twitter">Twitter Classic</a>
            </nav>
        </aside>
        
        <div class="main-hero-content">
        <!-- MAIN CONTENT AREA -->
            <main class="content">
                {% block content %}
                {% endblock %}
            </main>

            <!-- PERMANENT FOOTER -->
            <footer class="bottom-banner">
                info@thepolka.cloud | support@thepolka.cloud | sales@thepolka.cloud
                <div class="legal">
                    The Polkadot Cloud™ — Patent pending. Trademark applications filed and in process.
                    Copyright ©2019-2026. All rights reserved.
                </div>
            </footer>
        </div>

    </div>
        <!-- JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
